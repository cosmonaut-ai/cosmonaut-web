name: Deploy to S3

on:
  push:
    branches:
      - main
      - develop

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Set Environment Variables
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "S3_BUCKET=cosmonaut-prod-frontend" >> $GITHUB_ENV
            echo "CLOUDFRONT_DISTRIBUTION_ID=E10792TCHVPSKQ" >> $GITHUB_ENV
            echo "PUBLIC_API_BASE_URL=https://api.cosmonaut-ai.com" >> $GITHUB_ENV
            echo "PUBLIC_STREAMING_BASE_URL=https://streaming.cosmonaut-ai.com" >> $GITHUB_ENV
            echo "PUBLIC_COGNITO_USER_POOL_ID=us-east-2_NE7ZsAjT9" >> $GITHUB_ENV
            echo "PUBLIC_COGNITO_CLIENT_ID=127ioqo9dk9hc4n677t8lf9ft6" >> $GITHUB_ENV
            echo "PUBLIC_COGNITO_DOMAIN=cosmonaut-prod.auth.us-east-2.amazoncognito.com" >> $GITHUB_ENV
            echo "PUBLIC_COGNITO_REDIRECT_URI=https://cosmonaut-ai.com/callback" >> $GITHUB_ENV
            echo "PUBLIC_ENV=prod" >> $GITHUB_ENV
          else
            echo "S3_BUCKET=cosmonaut-dev-frontend" >> $GITHUB_ENV
            echo "CLOUDFRONT_DISTRIBUTION_ID=E2B2XQRISFFDLK" >> $GITHUB_ENV
            echo "PUBLIC_API_BASE_URL=https://api.dev.cosmonaut-ai.com" >> $GITHUB_ENV
            echo "PUBLIC_STREAMING_BASE_URL=https://streaming.dev.cosmonaut-ai.com" >> $GITHUB_ENV
            echo "PUBLIC_COGNITO_USER_POOL_ID=us-east-2_GWLKBPNKF" >> $GITHUB_ENV
            echo "PUBLIC_COGNITO_CLIENT_ID=7bsqjkt7g0notvqm4m5rvdl56g" >> $GITHUB_ENV
            echo "PUBLIC_COGNITO_DOMAIN=cosmonaut-dev.auth.us-east-2.amazoncognito.com" >> $GITHUB_ENV
            echo "PUBLIC_COGNITO_REDIRECT_URI=https://dev.cosmonaut-ai.com/callback" >> $GITHUB_ENV
            echo "PUBLIC_ENV=dev" >> $GITHUB_ENV
          fi
          echo "PUBLIC_SENTRY_RELEASE=${{ github.sha }}" >> $GITHUB_ENV
          echo "PUBLIC_POSTHOG_HOST=REDACTED_PUBLIC_POSTHOG_HOST" >> $GITHUB_ENV
          echo "PUBLIC_POSTHOG_PROJECT_TOKEN=REDACTED_PUBLIC_POSTHOG_TOKEN" >> $GITHUB_ENV

      - name: Build
        run: npm run build
        env:
          CI: true
          PUBLIC_API_BASE_URL: ${{ env.PUBLIC_API_BASE_URL }}
          PUBLIC_STREAMING_BASE_URL: ${{ env.PUBLIC_STREAMING_BASE_URL }}
          PUBLIC_COGNITO_USER_POOL_ID: ${{ env.PUBLIC_COGNITO_USER_POOL_ID }}
          PUBLIC_COGNITO_CLIENT_ID: ${{ env.PUBLIC_COGNITO_CLIENT_ID }}
          PUBLIC_COGNITO_DOMAIN: ${{ env.PUBLIC_COGNITO_DOMAIN }}
          PUBLIC_COGNITO_REDIRECT_URI: ${{ env.PUBLIC_COGNITO_REDIRECT_URI }}
          PUBLIC_AWS_REGION: us-east-2
          PUBLIC_ENV: ${{ env.PUBLIC_ENV }}
          PUBLIC_SENTRY_RELEASE: ${{ env.PUBLIC_SENTRY_RELEASE }}
          PUBLIC_POSTHOG_HOST: ${{ env.PUBLIC_POSTHOG_HOST }}
          PUBLIC_POSTHOG_PROJECT_TOKEN: ${{ env.PUBLIC_POSTHOG_PROJECT_TOKEN }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-2

      # Deploy in order: immutable assets first, then non-immutable, then index.html last.
      # This ensures all referenced assets exist on S3 before any client loads new HTML.

      - name: Upload immutable assets (additive — old hashes preserved)
        run: |
          aws s3 sync build/_app/immutable/ s3://${{ env.S3_BUCKET }}/_app/immutable/ \
            --cache-control "public, max-age=31536000, immutable" \
            --size-only

      - name: Upload version metadata (short cache so version polling works)
        run: |
          if [ -f build/_app/version.json ]; then
            aws s3 cp build/_app/version.json s3://${{ env.S3_BUCKET }}/_app/version.json \
              --cache-control "public, max-age=60"
          fi

      - name: Upload remaining static assets
        run: |
          aws s3 sync build/ s3://${{ env.S3_BUCKET }} \
            --exclude '_app/immutable/*' \
            --exclude '_app/version.json' \
            --exclude 'index.html' \
            --cache-control "public, max-age=3600" \
            --delete

      - name: Upload index.html (last)
        run: |
          aws s3 cp build/index.html s3://${{ env.S3_BUCKET }}/index.html \
            --cache-control "no-cache, no-store, must-revalidate"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ env.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/index.html" "/" "/_app/version.json"

      - name: Clean up stale immutable assets
        continue-on-error: true
        run: |
          CUTOFF=$(date -u -d '7 days ago' +%Y-%m-%dT%H:%M:%SZ)

          aws s3api list-objects-v2 \
            --bucket "${{ env.S3_BUCKET }}" \
            --prefix "_app/immutable/" \
            --query "Contents[?LastModified<\`${CUTOFF}\`].Key" \
            --output text | tr '\t' '\n' | while read -r key; do
            if [ -n "$key" ] && [ "$key" != "None" ] && [ ! -f "build/${key}" ]; then
              echo "Deleted stale asset: $key"
              aws s3api delete-object --bucket "${{ env.S3_BUCKET }}" --key "$key"
            fi
          done
