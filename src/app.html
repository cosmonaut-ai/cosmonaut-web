<!doctype html>
<html lang="en" class="dark">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="theme-color" content="#0f1219" />

		<!-- Fallback meta for SPA pages (overridden by svelte:head on pre-rendered pages) -->
		<meta
			name="description"
			content="Create, explore, and share interactive story worlds. Every choice shapes the narrative."
		/>
		<meta property="og:site_name" content="Cosmonaut" />
		<meta property="og:title" content="Cosmonaut - Explore Infinite Story Worlds" />
		<meta
			property="og:description"
			content="Create, explore, and share interactive story worlds. Every choice shapes the narrative."
		/>
		<meta property="og:image" content="https://cosmonaut-ai.com/og-image.png" />
		<meta property="og:image:width" content="2230" />
		<meta property="og:image:height" content="1454" />
		<meta property="og:type" content="website" />
		<meta property="og:locale" content="en_US" />
		<meta name="twitter:card" content="summary_large_image" />
		<meta name="twitter:title" content="Cosmonaut - Explore Infinite Story Worlds" />
		<meta
			name="twitter:description"
			content="Create, explore, and share interactive story worlds. Every choice shapes the narrative."
		/>
		<meta name="twitter:image" content="https://cosmonaut-ai.com/og-image.png" />

		<link rel="apple-touch-icon" sizes="180x180" href="/favicons/apple-touch-icon.png" />
		<link rel="icon" type="image/png" sizes="32x32" href="/favicons/favicon-32x32.png" />
		<link rel="icon" type="image/png" sizes="16x16" href="/favicons/favicon-16x16.png" />
		<link rel="icon" href="/favicons/favicon.ico" sizes="any" />
		<link rel="manifest" href="/favicons/site.webmanifest" />
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link
			href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=JetBrains+Mono:wght@400;500&family=Orbitron:wght@400..900&display=swap"
			rel="stylesheet"
		/>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
